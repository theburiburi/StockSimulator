spring:
  application:
    name: stockSimulator

  # datasourceлҠ” applicationкіј к°ҷмқҖ лқјмқём—җ мһҲм–ҙм•ј н•©лӢҲлӢӨ.
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: "016777334309c0768a382f4ef0920ffa"
            client-authentication-method: POST
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  datasource:
    url: jdbc:postgresql://localhost:5432/stock_db
    username: jouijae  # л§Ңм•Ҫ м—°кІ° м—җлҹ¬к°Җ лӮҳл©ҙ ліёмқёмқҳ Mac кі„м •лӘ…мңјлЎң л°”кҝ”ліҙм„ёмҡ”.
    password: ""
    driver-class-name: org.postgresql.Driver

  # JPA м„Өм •
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis м„Өм •
  data:
    redis:
      host: localhost
      port: 6379

# м„ңлІ„ нҸ¬нҠё м„Өм • (spring мҶҢмҶҚмқҙ м•„лӢҲлҜҖлЎң л§Ё м•һмңјлЎң л¶ҷмһ…лӢҲлӢӨ)
server:
  port: 8080