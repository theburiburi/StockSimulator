<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"> <title>실시간 주식 시뮬레이터</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f4f4f9; }
        .stock-card {
            background: white; border-radius: 8px; padding: 15px; margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between;
            align-items: center;
        }
        .price-info { text-align: right; }
        .price { font-weight: bold; font-size: 1.2em; }
        .up { color: #e74c3c; }   /* 상승: 빨간색 */
        .down { color: #3498db; } /* 하락: 파란색 */
        .equal { color: #333; }   /* 변동없음 */
    </style>
</head>
<body>
<h1>📈 실시간 주식 전광판</h1>
<div id="stock-list"></div>

<script>
    const socket = new SockJS('/ws-stock');
    const stompClient = Stomp.over(socket);

    // 디버그 로그 끄기 (콘솔 깨끗하게)
    stompClient.debug = null;

    stompClient.connect({}, function (frame) {
        console.log('연결 성공!');
        stompClient.subscribe('/topic/stock', function (response) {
            const stock = JSON.parse(response.body);
            updateStockUI(stock);
        });
    });

    function updateStockUI(stock) {
        const list = document.getElementById('stock-list');
        let stockElement = document.getElementById('stock-' + stock.code);

        if (!stockElement) {
            stockElement = document.createElement('div');
            stockElement.id = 'stock-' + stock.code;
            stockElement.className = 'stock-card';
            list.appendChild(stockElement);
        }

        // 숫자형 변환 (중요)
        const current = Number(stock.currentPrice);
        const open = Number(stock.openingPrice);

        const diff = current - open;
        const rate = open !== 0 ? ((diff / open) * 100).toFixed(2) : "0.00";

        let colorClass = 'equal';
        let sign = '';

        if (diff > 0) {
            colorClass = 'up';
            sign = '+';
        } else if (diff < 0) {
            colorClass = 'down';
        }

        // innerHTML로 전체를 갈아 끼워 실시간 반영 보장
        stockElement.innerHTML = `
                <div>
                    <strong>${stock.name}</strong> <span style="color:#888; font-size:0.9em;">(${stock.code})</span>
                </div>
                <div class="price-info">
                    <div class="price ${colorClass}">${current.toLocaleString()}원</div>
                    <div class="${colorClass}" style="font-size:0.9em;">(${sign}${rate}%)</div>
                </div>
            `;
    }
</script>
</body>
</html>
